---
- name: Deploy Application
  hosts: all
  become: yes
  tasks:
    - name: Copy application source code
      copy:
        src: ../../AI_Log_Analysis-Project-1/bedrock-log-analyzer-ui/
        dest: /home/ec2-user/bedrock-log-analyzer-ui/
        owner: ec2-user
        group: ec2-user

    - name: Copy app.env template
      template:
        src: ../templates/app.env.j2
        dest: /home/ec2-user/bedrock-log-analyzer-ui/.env
        owner: ec2-user
        group: ec2-user
        mode: '0600'

    - name: Build and Run App Container
      shell: |
        cd /home/ec2-user/bedrock-log-analyzer-ui
        docker build -t bedrock-log-analyzer-ui:latest .
        docker rm -f log-analyzer-ui || true
        docker run -d --name log-analyzer-ui -p 80:80 -v /home/ec2-user/bedrock-log-analyzer-ui/.env:/app/.env bedrock-log-analyzer-ui:latest
      become_user: ec2-user
