---
- name: Deploy Log Analyzer Application
  hosts: app
  become: yes
  tasks:
    - name: Copy application source code to remote host
      copy:
        src: "{{ playbook_dir }}/../../AI_Log_Analysis-Project-1/bedrock-log-analyzer-ui/"
        dest: /home/ec2-user/bedrock-log-analyzer-ui/
        owner: ec2-user
        group: ec2-user

    - name: Copy app.env template
      template:
        src: "{{ playbook_dir }}/../templates/app.env.j2"
        dest: /home/ec2-user/bedrock-log-analyzer-ui/.env
        owner: ec2-user
        group: ec2-user
        mode: '0600'

    - name: Build Docker image from source
      community.docker.docker_image:
        name: bedrock-log-analyzer-ui
        tag: latest
        source: build
        build:
          path: /home/ec2-user/bedrock-log-analyzer-ui
        force_source: yes

    - name: Run Log Analyzer UI container
      community.docker.docker_container:
        name: log-analyzer-ui
        image: bedrock-log-analyzer-ui:latest
        state: started
        restart_policy: unless-stopped
        recreate: yes
        command: >
          streamlit run streamlit_app.py 
          --server.port=8501 
          --server.address=0.0.0.0
          --server.enableCORS=false
          --server.enableXsrfProtection=false
        ports:
          - "80:8501"
        volumes:
          - /home/ec2-user/bedrock-log-analyzer-ui/.env:/app/.env:ro
